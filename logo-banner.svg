<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150">
  <!-- Background -->
  <rect width="600" height="150" rx="10" fill="#0D1117"/>
  
  <!-- Excel icon -->
  <rect x="30" y="35" width="60" height="80" rx="5" fill="#217346"/>
  <line x1="30" y1="55" x2="90" y2="55" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
  <line x1="30" y1="75" x2="90" y2="75" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
  <line x1="30" y1="95" x2="90" y2="95" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="35" x2="50" y2="115" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
  <line x1="70" y1="35" x2="70" y2="115" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Arrow -->
  <path d="M105 75 L135 75" stroke="#FF6B35" stroke-width="4" stroke-linecap="round"/>
  <polygon points="145,75 130,65 130,85" fill="#FF6B35"/>
  
  <!-- Delta/Spark icon -->
  <polygon points="175,45 205,105 145,105" fill="none" stroke="#FF3621" stroke-width="3"/>
  <polygon points="175,60 195,95 155,95" fill="#FF3621"/>
  
  <!-- Text -->
  <text x="230" y="70" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">databricks-excel-reader</text>
  <text x="230" y="100" font-family="Arial, sans-serif" font-size="16" fill="#8B949E">Read large Excel files on small clusters</text>
  
  <!-- Badges -->
  <rect x="230" y="110" width="45" height="20" rx="3" fill="#217346"/>
  <text x="252" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">3.2x</text>
  
  <rect x="285" y="110" width="55" height="20" rx="3" fill="#FF3621"/>
  <text x="312" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">No OOM</text>
  
  <rect x="350" y="110" width="65" height="20" rx="3" fill="#238636"/>
  <text x="382" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">75% cost ↓</text>
</svg>
